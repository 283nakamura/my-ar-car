<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VTOL VR - Smooth Takeoff</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
      #ui-container { position: fixed; bottom: 40px; left: 0; width: 100%; z-index: 100000; display: flex; justify-content: center; pointer-events: none; }
      .action-btn { 
        pointer-events: auto; background: #00d4ff; color: #000; border: none; padding: 15px 35px; 
        font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 18px; 
        box-shadow: 0 4px 15px rgba(0,212,255,0.4); -webkit-tap-highlight-color: transparent;
      }
      #video-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 90000; background: #000; display: none; }
      video { width: 100%; height: 100%; object-fit: cover; }
      #fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 0; z-index: 95000; pointer-events: none; transition: 1.5s; }
    </style>
  </head>
  <body>

    <div id="fade-overlay"></div>

    <div id="ui-container">
      <div id="btn-area">
        <button id="btn-main" class="action-btn" onclick="handleStart()">システム起動</button>
      </div>
    </div>

    <div id="video-layer">
      <video id="mission-video" playsinline crossorigin="anonymous" src="niagara.mp4"></video>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <a-asset-item id="car-model" src="beta_alia_vtol_aircraft.glb"></a-asset-item>
        <img id="virtual-bg" src="test.jpg">
      </a-assets>

      <a-sky src="#virtual-bg" radius="100" rotation="0 -90 0" segments-width="64" segments-height="64"></a-sky>

      <a-entity id="moving-car" position="0 -15 -40">
          <a-gltf-model id="model-entity" src="#car-model" scale="0.5 0.5 0.5" rotation="0 180 0"></a-gltf-model>
      </a-entity>

      <a-entity id="camera-rig" position="0 1.6 0">
        <a-entity id="main-camera" camera="active: true; fov: 65" look-controls="magic-window-trackingEnabled: true; touchEnabled: true"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      const btnMain = document.getElementById('btn-main');
      const videoLayer = document.getElementById('video-layer');
      const missionVideo = document.getElementById('mission-video');
      const fade = document.getElementById('fade-overlay');
      const model = document.getElementById('model-entity');
      const car = document.getElementById('moving-car');
      const cam = document.getElementById('main-camera');

      async function handleStart() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const response = await DeviceOrientationEvent.requestPermission();
            if (response === 'granted') {
              cam.components['look-controls'].pause();
              cam.setAttribute('rotation', '0 0 0');
              cam.components['look-controls'].play();
            }
          } catch (e) { console.error(e); }
        }

        model.setAttribute('animation-mixer', "clip: *; timeScale: 5");
        btnMain.innerText = "離陸開始";
        btnMain.setAttribute('onclick', 'handleTakeOff()');
        missionVideo.play().then(() => { missionVideo.pause(); missionVideo.currentTime = 0; });
      }

      function handleTakeOff() {
        btnMain.style.display = 'none';
        
        // 【フェーズ1】ゆっくり後退しながら上昇 (5秒かけて Z:-10から-5へ)
        car.setAttribute('animation__takeoff', {
          property: 'position',
          from: '0 -15 -40',
          to: '0 6 -25',
          dur: 5000, 
          easing: 'easeInOutQuad'
        });

        // 【フェーズ2】ホバリング（1秒間）
        setTimeout(() => {
          
          // 【フェーズ3】前方へフル加速
          setTimeout(() => {
            car.setAttribute('animation__forward', {
              property: 'position',
              from: '0 6 -5',
              to: '0 6 -60',
              dur: 4000,
              easing: 'easeInQuad'
            });

            // 動画フェード
            setTimeout(() => { fade.style.opacity = "1"; }, 3000);
            setTimeout(() => {
              document.querySelector('a-scene').style.display = 'none';
              videoLayer.style.display = 'block';
              missionVideo.play();
              fade.style.opacity = "0";
              setTimeout(triggerTrouble, 10000); 
            }, 4000);

          }, 1000); // ホバリング 1秒
        }, 5000); // 上昇 5秒
      }

      function triggerTrouble() {
        missionVideo.pause();
        document.getElementById('ui-container').style.display = 'flex';
        document.getElementById('btn-area').innerHTML = `
          <div style="display:flex; gap:10px;">
            <button class="action-btn" style="background:#ffaa00;" onclick="handleChoice()">高度UP</button>
            <button class="action-btn" style="background:#ffaa00;" onclick="handleChoice()">回避</button>
          </div>
        `;
      }

      function handleChoice() {
        document.getElementById('btn-area').innerHTML = '';
        missionVideo.play();
        missionVideo.onended = () => {
          fade.style.opacity = "1";
          setTimeout(() => {
            videoLayer.style.display = 'none';
            document.getElementById('btn-area').innerHTML = `<button class="action-btn" onclick="location.reload()">Reset</button>`;
            fade.style.opacity = "0";
          }, 1000);
        };
      }
    </script>
  </body>
</html>
